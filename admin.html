<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Administrador Re-Moda</title><style>
:root{--verde:#145c35;--verde2:#dff3d9;--fondo:#f4fff2;--borde:#cfe8c8;--danger:#b3261e}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--fondo);color:#132f20}.wrap{max-width:1100px;margin:auto;padding:14px}header{background:white;border-bottom:1px solid var(--borde);position:sticky;top:0;z-index:20}.head{display:flex;justify-content:space-between;align-items:center;gap:12px}.brand{display:flex;align-items:center;gap:12px}.brand img{width:70px;height:70px;object-fit:contain;border-radius:14px}.brand h1{margin:0;color:var(--verde)}.btn{border:0;border-radius:12px;padding:11px 14px;background:var(--verde);color:white;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block}.btn.sec{background:white;color:var(--verde);border:1px solid var(--verde)}.btn.danger{background:var(--danger)}.panel,.card{background:white;border:1px solid var(--borde);border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 4px 15px rgba(0,0,0,.05)}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form label{font-weight:800;color:var(--verde)}input,select{width:100%;padding:12px;border:1px solid var(--borde);border-radius:12px;margin-top:5px}.full{grid-column:1/-1}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}.photos{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:190px;background:#eef6ed}.photos img{width:100%;height:190px;object-fit:cover}.pill{background:var(--verde2);border-radius:999px;padding:5px 9px;font-weight:800;color:var(--verde);font-size:12px}.row{display:flex;gap:8px;justify-content:space-between;align-items:center;flex-wrap:wrap}.price{font-size:24px;font-weight:900}.hidden{display:none}.small{font-size:12px;color:#607569}.empty{text-align:center;padding:25px;color:#607569}@media(max-width:650px){.form{grid-template-columns:1fr}.head{align-items:flex-start}.brand h1{font-size:22px}}
</style></head><body>
<header><div class="wrap head"><div class="brand"><img src="logo.png"><div><h1>Panel administrador</h1><p class="small">Agregar, editar, eliminar y subir 2 fotos por prenda</p></div></div><div><a class="btn sec" href="index.html">Ver tienda</a></div></div></header>
<main class="wrap">
<section id="loginBox" class="panel"><h2>Acceso administrador</h2><p class="small">Para agregar, editar o eliminar prendas debes ingresar la contraseña de administrador.</p><input id="adminPass" type="password" placeholder="Clave administrador" onkeydown="if(event.key==='Enter')loginAdmin()"><br><br><button class="btn" onclick="loginAdmin()">Entrar</button></section>
<section id="adminBox" class="hidden"><div class="panel"><div class="row"><h2>Administrar prendas</h2><div><button class="btn" onclick="nuevoProducto()">Agregar prenda</button> <button class="btn sec" onclick="cargarProductos()">Actualizar</button> <button class="btn sec" onclick="cerrarSesion()">Salir</button></div></div></div>
<div id="formBox" class="panel hidden"><h2 id="tituloForm">Agregar prenda</h2><div class="form"><label>ID<input id="p_id" placeholder="Ej: RM001"></label><label>Nombre<input id="p_nombre"></label><label>Marca<input id="p_marca"></label><label>Talla<input id="p_talla"></label><label>Precio<input id="p_precio" type="number"></label><label>Stock<input id="p_stock" type="number" value="1"></label><label>Estado<select id="p_estado"><option>Disponible</option><option>Vendido</option></select></label><label>WhatsApp tienda<input id="p_whatsapp" value="56928117329"></label><label class="full">Foto 1<input id="p_foto1" type="file" accept="image/*"></label><label class="full">Foto 2<input id="p_foto2" type="file" accept="image/*"></label><input type="hidden" id="p_foto1url"><input type="hidden" id="p_foto2url"><div class="full"><button class="btn" onclick="guardarProducto()">Guardar prenda</button> <button class="btn sec" onclick="ocultarForm()">Cancelar</button></div></div></div>
<div id="productos" class="grid"></div></section></main>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbx8vQ993oFXcuf4hgkoP0cWvagiMMJgLa_XFPhJrEjHIGaQkeDsyZ6uMT23zbcHvExP/exec';const WHATSAPP_TIENDA='56928117329';let productos=[],adminToken=sessionStorage.getItem('remoda_admin_token')||'';const qs=id=>document.getElementById(id);const money=n=>'$'+Number(n||0).toLocaleString('es-CL');function imgFallback(e){e.target.src='logo.png'}
async function api(action,data={}){try{const r=await fetch(API_URL+'?t='+Date.now(),{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,token:adminToken,...data})});return await r.json()}catch(e){if(action==='listProducts'){const r=await fetch(API_URL+'?action=listProducts&t='+Date.now());return await r.json()}throw e}}
async function loginAdmin(){const r=await api('login',{password:qs('adminPass').value});if(r.ok){adminToken=r.token;sessionStorage.setItem('remoda_admin_token',adminToken);mostrarAdmin();cargarProductos()}else alert('Clave incorrecta')}
function mostrarAdmin(){qs('loginBox').classList.add('hidden');qs('adminBox').classList.remove('hidden')}function cerrarSesion(){sessionStorage.removeItem('remoda_admin_token');adminToken='';location.reload()}function ocultarForm(){qs('formBox').classList.add('hidden')}
async function cargarProductos(){qs('productos').innerHTML='<div class="empty">Cargando...</div>';const r=await api('listProducts'); if(!r.ok){qs('productos').innerHTML='<div class="empty">Error Apps Script: '+(r.error||'sin detalle')+'</div>'; return;} productos=r.productos||[];render()}
function render(){if(!productos.length){qs('productos').innerHTML='<div class="empty">No hay prendas registradas.</div>';return}qs('productos').innerHTML=productos.map(p=>`<article class="card"><div class="photos"><img src="${p.foto1||'logo.png'}" onerror="imgFallback(event)"><img src="${p.foto2||p.foto1||'logo.png'}" onerror="imgFallback(event)"></div><div class="row"><span class="pill">ID: ${p.id||''}</span><span class="pill">${p.estado||'Disponible'}</span></div><h3>${p.nombre||''}</h3><div>Marca: ${p.marca||'-'} · Talla: ${p.talla||'-'}</div><div class="price">${money(p.precio)}</div><div>Stock: ${p.stock||0}</div><br><button class="btn sec" onclick='editarProducto(${JSON.stringify(p).replace(/'/g,"&#39;")})'>Editar</button> <button class="btn" onclick='descontarStock("${String(p.id).replace(/"/g,'&quot;')}")'>-1 stock</button> <button class="btn danger" onclick='eliminarProducto("${String(p.id).replace(/"/g,'&quot;')}")'>Eliminar</button></article>`).join('')}
function generarIdLocal(){let d=new Date();let pad=n=>String(n).padStart(2,'0');return 'RM'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds())}
function nuevoProducto(){['id','nombre','marca','talla','precio','stock','foto1url','foto2url'].forEach(k=>{let e=qs('p_'+k);if(e)e.value=''});qs('p_id').value=generarIdLocal();qs('p_stock').value=1;qs('p_estado').value='Disponible';qs('p_whatsapp').value=WHATSAPP_TIENDA;qs('tituloForm').textContent='Agregar prenda';qs('formBox').classList.remove('hidden')}
function editarProducto(p){nuevoProducto();qs('tituloForm').textContent='Editar prenda';qs('p_id').value=p.id||'';qs('p_nombre').value=p.nombre||'';qs('p_marca').value=p.marca||'';qs('p_talla').value=p.talla||'';qs('p_precio').value=p.precio||'';qs('p_stock').value=p.stock||0;qs('p_estado').value=p.estado||'Disponible';qs('p_foto1url').value=p.foto1||'';qs('p_foto2url').value=p.foto2||'';qs('p_whatsapp').value=p.whatsapp||WHATSAPP_TIENDA}
function fileToBase64(file){return new Promise(res=>{if(!file)return res('');let r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file)})}
async function guardarProducto(){let f1=await fileToBase64(qs('p_foto1').files[0]),f2=await fileToBase64(qs('p_foto2').files[0]);let data={producto:{id:qs('p_id').value.trim(),nombre:qs('p_nombre').value.trim(),marca:qs('p_marca').value.trim(),talla:qs('p_talla').value.trim(),precio:qs('p_precio').value,stock:qs('p_stock').value,estado:qs('p_estado').value,whatsapp:qs('p_whatsapp').value||WHATSAPP_TIENDA,foto1:qs('p_foto1url').value,foto2:qs('p_foto2url').value},foto1Base64:f1,foto2Base64:f2};let r=await api('saveProduct',data);if(r.ok){alert('Prenda guardada');ocultarForm();cargarProductos()}else alert(r.error||'No se pudo guardar')}
async function descontarStock(id){if(!confirm('¿Descontar 1 unidad del stock?'))return;let r=await api('discountStock',{id,cantidad:1});if(r.ok)cargarProductos();else alert(r.error||'No se pudo descontar')}
async function eliminarProducto(id){if(!confirm('¿Eliminar completamente esta prenda?'))return;let r=await api('deleteProduct',{id});if(r.ok)cargarProductos();else alert(r.error||'No se pudo eliminar')}
if(adminToken){mostrarAdmin();cargarProductos()}
</script></body></html>
